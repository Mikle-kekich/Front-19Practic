services:
  backend-1:
    build: .
    container_name: mango-backend-1
    environment:
      PORT: 3000
      INSTANCE_NAME: backend-1
      MONGO_URI: mongodb://mongo:27017/user_management_nosql
      REDIS_URL: redis://redis:6379
    depends_on:
      - mongo
      - redis
    networks:
      - app-network

  backend-2:
    build: .
    container_name: mango-backend-2
    environment:
      PORT: 3000
      INSTANCE_NAME: backend-2
      MONGO_URI: mongodb://mongo:27017/user_management_nosql
      REDIS_URL: redis://redis:6379
    depends_on:
      - mongo
      - redis
    networks:
      - app-network

  nginx:
    image: nginx:1.27-alpine
    container_name: mango-nginx
    ports:
      - "80:80"
    volumes:
      - ./configs/nginx.docker.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend-1
      - backend-2
    networks:
      - app-network

  mongo:
    image: mongo:7
    container_name: mango-mongo
    volumes:
      - mongo-data:/data/db
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    container_name: mango-redis
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  mongo-data:
