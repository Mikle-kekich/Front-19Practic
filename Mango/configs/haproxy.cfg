global
    log stdout format raw local0
    maxconn 2048

defaults
    mode http
    log global
    option httplog
    option dontlognull
    timeout connect 5s
    timeout client 30s
    timeout server 30s

frontend app_frontend
    bind 127.0.0.1:8081
    default_backend app_backends

backend app_backends
    balance roundrobin
    option httpchk GET /api/health
    http-check expect status 200
    server backend1 127.0.0.1:3001 check fall 3 rise 2
    server backend2 127.0.0.1:3002 check fall 3 rise 2
